<!DOCTYPE html>
<html>
<head>
  <title>GitHub File Explorer</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    h1 { color:#00ff99; }
    button {
      display:block;
      width:100%;
      text-align:left;
      padding:12px;
      margin:6px 0;
      background:#222;
      color:white;
      border:0;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }
    button:hover { background:#333; }
    #error { color:#ff5555; }
  </style>
</head>
<body>

<h1>📁 My File Explorer</h1>
<p id="path">Path: /</p>
<div id="error"></div>
<div id="files">Loading...</div>

<script>
const USERNAME = "Elay319";     // your GitHub username
const REPO = "folders";      // your repo name
const BRANCH = "main";          // try "master" if main doesn't work

let currentPath = "";

async function loadFiles(path = "") {
  currentPath = path;

  document.getElementById("path").textContent = "Path: /" + path;
  document.getElementById("files").innerHTML = "Loading...";
  document.getElementById("error").textContent = "";

  const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${path}?ref=${BRANCH}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById("files").innerHTML = "";
      document.getElementById("error").textContent =
        "Error: repo/branch not found. Check USERNAME, REPO, BRANCH.";
      console.log(data);
      return;
    }

    const files = document.getElementById("files");
    files.innerHTML = "";

    if (path !== "") {
      const backBtn = document.createElement("button");
      backBtn.textContent = "⬅ Back";
      backBtn.onclick = () => {
        const parts = currentPath.split("/");
        parts.pop();
        loadFiles(parts.join("/"));
      };
      files.appendChild(backBtn);
    }

    data.forEach(item => {
      if (item.name === "index.html") return;

      const btn = document.createElement("button");

      if (item.type === "dir") {
        btn.textContent = "📁 " + item.name;
        btn.onclick = () => loadFiles(item.path);
      } else {
        btn.textContent = "📄 " + item.name;
        btn.onclick = () => {
          window.open(item.download_url, "_blank");
        };
      }

      files.appendChild(btn);
    });

    if (files.innerHTML === "") {
      files.innerHTML = "No files here.";
    }

  } catch (err) {
    document.getElementById("files").innerHTML = "";
    document.getElementById("error").textContent = "JavaScript error. Check console.";
    console.error(err);
  }
}

loadFiles();
</script>

</body>
</html>
